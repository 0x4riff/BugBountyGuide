<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Bounty Guide - AI Control Center</title>
  <style>
    :root {
      --bg-color: #f5f5f7;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-disabled: #86868b;
      --card-bg: rgba(255, 255, 255, 0.8);
      --border-color: rgba(0, 0, 0, 0.1);
      --success: #34c759;
      --error: #ff3b30;
      --warning: #ff9500;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #000000;
        --text-primary: #f5f5f7;
        --text-secondary: #86868b;
        --accent: #2997ff;
        --card-bg: rgba(28, 28, 30, 0.8);
        --border-color: rgba(255, 255, 255, 0.15);
      }
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      padding: 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .badge {
      font-size: 12px;
      font-weight: 600;
      background-color: var(--accent);
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 768px) {
      .grid {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: -0.2px;
    }
    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background-color: rgba(0, 0, 0, 0.02);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    @media (prefers-color-scheme: dark) {
      input[type="text"], input[type="number"], textarea, select {
        background-color: rgba(255, 255, 255, 0.04);
      }
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
    }
    .checkbox-group input {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background-color: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      opacity: 0.95;
    }
    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      margin-top: 10px;
    }
    .status-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
    }
    .status-val {
      font-weight: 500;
    }
    .status-success { color: var(--success); }
    .status-error { color: var(--error); }
    .status-warning { color: var(--warning); }
    .toast {
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }
    .toast-success {
      background-color: rgba(52, 199, 89, 0.15);
      color: var(--success);
      border: 1px solid rgba(52, 199, 89, 0.2);
    }
    .toast-error {
      background-color: rgba(255, 59, 48, 0.15);
      color: var(--error);
      border: 1px solid rgba(255, 59, 48, 0.2);
    }
    .code-preview {
      background-color: rgba(0, 0, 0, 0.03);
      border-radius: 10px;
      padding: 12px;
      font-family: Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      overflow-x: auto;
      max-height: 200px;
      margin-top: 10px;
      border: 1px solid var(--border-color);
    }
    @media (prefers-color-scheme: dark) {
      .code-preview {
        background-color: rgba(255, 255, 255, 0.03);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Control Center</h1>
      <span class="badge">OpenClaw Canvas</span>
    </header>

    <div class="grid">
      <div class="card">
        <h2>Target and Scope Manifest</h2>
        <form id="scopeForm">
          <div class="form-group">
            <label for="program">Program Name</label>
            <input type="text" id="program" value="My Target Program" required>
          </div>
          <div class="form-group">
            <label for="authUrl">Authorization URL</label>
            <input type="text" id="authUrl" value="https://bugcrowd.com/example-program" required>
          </div>
          <div class="form-group">
            <label for="assets">Target Assets (Comma-separated)</label>
            <input type="text" id="assets" value="api.example.com, app.example.com" required>
          </div>
          <div class="form-group">
            <label for="rate">Max Request Rate (RPS)</label>
            <input type="number" id="rate" min="0.1" max="10" step="0.1" value="2.0" required>
          </div>
          <div class="form-group">
            <label for="header">Custom ID Header (Optional)</label>
            <input type="text" id="header" placeholder="X-Researcher: 0x4riff">
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="confirmed" checked>
            <label for="confirmed" style="text-transform: none; font-size: 13px;">I have manually confirmed program scope policy</label>
          </div>
          <button type="submit" class="btn">Generate Manifest</button>
        </form>
      </div>

      <div class="status-panel">
        <div class="card">
          <h2>Safety Verification</h2>
          <div class="status-item">
            <span>Structure Status</span>
            <span id="structStatus" class="status-val status-warning">Not Checked</span>
          </div>
          <div class="status-item">
            <span>Authorization Gate</span>
            <span id="authStatus" class="status-val status-warning">Pending</span>
          </div>
          <div class="status-item">
            <span>Rate Budget</span>
            <span id="rateStatus" class="status-val">N/A</span>
          </div>
          <div id="toast" class="toast" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
          <h2>JSON Output</h2>
          <pre id="jsonPreview" class="code-preview">{}</pre>
          <button id="copyBtn" class="btn btn-secondary">Copy Manifest</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('scopeForm');
    const toast = document.getElementById('toast');
    const structStatus = document.getElementById('structStatus');
    const authStatus = document.getElementById('authStatus');
    const rateStatus = document.getElementById('rateStatus');
    const jsonPreview = document.getElementById('jsonPreview');
    const copyBtn = document.getElementById('copyBtn');

    function updateDashboard(manifest) {
      jsonPreview.textContent = JSON.stringify(manifest, null, 2);

      // Basic checks
      let hasError = false;
      let errorMsg = '';

      if (!manifest.authorization_confirmed) {
        authStatus.textContent = 'Blocked';
        authStatus.className = 'status-val status-error';
        hasError = true;
        errorMsg += 'Confirm authorization policy manually. ';
      } else {
        authStatus.textContent = 'Confirmed';
        authStatus.className = 'status-val status-success';
      }

      if (!manifest.authorization_url.startsWith('https://')) {
        hasError = true;
        errorMsg += 'Authorization URL must be HTTPS. ';
      }

      if (manifest.max_requests_per_second > 10 || manifest.max_requests_per_second <= 0) {
        hasError = true;
        errorMsg += 'RPS must be between 0.1 and 10. ';
      }

      rateStatus.textContent = manifest.max_requests_per_second + ' RPS';

      if (hasError) {
        structStatus.textContent = 'Invalid';
        structStatus.className = 'status-val status-error';
        toast.className = 'toast toast-error';
        toast.textContent = errorMsg;
        toast.style.display = 'block';
      } else {
        structStatus.textContent = 'Valid';
        structStatus.className = 'status-val status-success';
        toast.className = 'toast toast-success';
        toast.textContent = 'Manifest is structure-safe. Ready for copy/integration.';
        toast.style.display = 'block';
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const assetsList = document.getElementById('assets').value
        .split(',')
        .map(a => a.trim())
        .filter(a => a.length > 0);

      const manifest = {
        program: document.getElementById('program').value,
        authorization_url: document.getElementById('authUrl').value,
        authorization_confirmed: document.getElementById('confirmed').checked,
        assets: assetsList,
        excluded_assets: [],
        allowed_tests: ["web", "api"],
        prohibited_tests: ["dos", "social-engineering", "credential-attacks"],
        max_requests_per_second: parseFloat(document.getElementById('rate').value),
        required_header: document.getElementById('header').value,
        accounts_owned: 2
      };

      updateDashboard(manifest);
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(jsonPreview.textContent);
      const originalText = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => {
        copyBtn.textContent = originalText;
      }, 2000);
    });

    // Initial load
    form.dispatchEvent(new Event('submit'));
  </script>
</body>
</html>
