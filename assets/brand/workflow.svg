<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
<title id="title">Operational workflow</title><desc id="desc">Seven gated phases for authorized AI-assisted bug bounty research</desc>
<rect width="1200" height="520" fill="#0b0f19"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#c9a96e"/></marker></defs>
<text x="64" y="64" fill="#f3f4f6" font-family="Georgia, serif" font-size="32">Operational workflow</text><text x="64" y="94" fill="#9ca3af" font-family="Arial" font-size="15">Every phase produces an artifact. Every active step passes authorization and safety gates.</text>
<g fill="none" stroke="#c9a96e" stroke-width="2" marker-end="url(#a)"><path d="M198 190H258"/><path d="M398 190H458"/><path d="M598 190H658"/><path d="M798 190H858"/><path d="M998 190H1058"/><path d="M1128 250 C1128 390 1010 425 925 425"/></g>
<g font-family="Arial" text-anchor="middle"><g><rect x="58" y="145" width="140" height="90" rx="10" fill="#111827" stroke="#c9a96e"/><text x="128" y="181" fill="#f3f4f6" font-size="16">01 · AUTHORIZE</text><text x="128" y="207" fill="#9ca3af" font-size="12">scope.json</text></g><g><rect x="258" y="145" width="140" height="90" rx="10" fill="#111827" stroke="#374151"/><text x="328" y="181" fill="#f3f4f6" font-size="16">02 · MAP</text><text x="328" y="207" fill="#9ca3af" font-size="12">inventory</text></g><g><rect x="458" y="145" width="140" height="90" rx="10" fill="#111827" stroke="#374151"/><text x="528" y="181" fill="#f3f4f6" font-size="16">03 · MODEL</text><text x="528" y="207" fill="#9ca3af" font-size="12">trust boundaries</text></g><g><rect x="658" y="145" width="140" height="90" rx="10" fill="#111827" stroke="#374151"/><text x="728" y="181" fill="#f3f4f6" font-size="16">04 · TEST</text><text x="728" y="207" fill="#9ca3af" font-size="12">minimal experiment</text></g><g><rect x="858" y="145" width="140" height="90" rx="10" fill="#111827" stroke="#374151"/><text x="928" y="181" fill="#f3f4f6" font-size="16">05 · VALIDATE</text><text x="928" y="207" fill="#9ca3af" font-size="12">controls</text></g><g><rect x="1058" y="145" width="112" height="90" rx="10" fill="#111827" stroke="#374151"/><text x="1114" y="181" fill="#f3f4f6" font-size="15">06 · REPORT</text><text x="1114" y="207" fill="#9ca3af" font-size="12">evidence</text></g><g><rect x="778" y="380" width="150" height="80" rx="10" fill="#18120a" stroke="#c9a96e"/><text x="853" y="414" fill="#f3f4f6" font-size="16">07 · STOP</text><text x="853" y="438" fill="#c9a96e" font-size="12">minimum proof</text></g></g>
<text x="64" y="490" fill="#6b7280" font-family="Arial" font-size="13">Fail closed: unclear scope, real-user data, instability, third-party assets, or irreversible change stops workflow.</text>
</svg>
