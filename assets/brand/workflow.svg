<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="wf-title wf-desc">
<title id="wf-title">Seven-Phase Operational Workflow</title>
<desc id="wf-desc">Gated phases from authorization through testing to final stop</desc>
<defs>
  <linearGradient id="wfbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
  <linearGradient id="wfgold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f5d07a"/><stop offset="100%" stop-color="#b8860b"/></linearGradient>
  <linearGradient id="wfblue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
  <linearGradient id="wfgreen" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
  <linearGradient id="wfred" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
  <linearGradient id="cardbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
  <filter id="wfglow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#c9a96e" flood-opacity="0.2"/></filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0,1 L10,5 L0,9 L3,5z" fill="#c9a96e" opacity="0.7"/></marker>
</defs>

<rect width="1200" height="600" fill="url(#wfbg)"/>

<!-- Header -->
<text x="60" y="50" fill="#f3f4f6" font-family="'SF Pro Display', -apple-system, sans-serif" font-size="28" font-weight="700">Operational Workflow</text>
<text x="60" y="78" fill="#6b7280" font-family="'SF Pro Text', -apple-system, sans-serif" font-size="14">Every phase produces an artifact. Every active step passes authorization and safety gates.</text>

<!-- Phase cards -->
<!-- 1. AUTHORIZE -->
<g transform="translate(40, 110)">
  <rect width="150" height="120" rx="12" fill="url(#cardbg)" stroke="#c9a96e" stroke-width="2" filter="url(#wfglow)"/>
  <rect width="150" height="4" rx="2" fill="url(#wfgold)"/>
  <text x="75" y="42" fill="#c9a96e" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">PHASE 01</text>
  <text x="75" y="68" fill="#f3f4f6" font-family="-apple-system, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Authorize</text>
  <text x="75" y="92" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="12" text-anchor="middle">scope.json</text>
  <text x="75" y="108" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Gate: safety check</text>
</g>

<!-- 2. MAP -->
<g transform="translate(220, 110)">
  <rect width="150" height="120" rx="12" fill="url(#cardbg)" stroke="#374151" stroke-width="1.5"/>
  <rect width="150" height="4" rx="2" fill="url(#wfblue)"/>
  <text x="75" y="42" fill="#60a5fa" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">PHASE 02</text>
  <text x="75" y="68" fill="#f3f4f6" font-family="-apple-system, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Map</text>
  <text x="75" y="92" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="12" text-anchor="middle">Inventory</text>
  <text x="75" y="108" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Asset discovery</text>
</g>

<!-- 3. MODEL -->
<g transform="translate(400, 110)">
  <rect width="150" height="120" rx="12" fill="url(#cardbg)" stroke="#374151" stroke-width="1.5"/>
  <rect width="150" height="4" rx="2" fill="url(#wfblue)"/>
  <text x="75" y="42" fill="#60a5fa" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">PHASE 03</text>
  <text x="75" y="68" fill="#f3f4f6" font-family="-apple-system, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Model</text>
  <text x="75" y="92" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="12" text-anchor="middle">Trust boundaries</text>
  <text x="75" y="108" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Actors &amp; states</text>
</g>

<!-- 4. TEST -->
<g transform="translate(580, 110)">
  <rect width="150" height="120" rx="12" fill="url(#cardbg)" stroke="#374151" stroke-width="1.5"/>
  <rect width="150" height="4" rx="2" fill="url(#wfgreen)"/>
  <text x="75" y="42" fill="#4ade80" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">PHASE 04</text>
  <text x="75" y="68" fill="#f3f4f6" font-family="-apple-system, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Test</text>
  <text x="75" y="92" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="12" text-anchor="middle">Minimal experiment</text>
  <text x="75" y="108" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">One variable</text>
</g>

<!-- 5. VALIDATE -->
<g transform="translate(760, 110)">
  <rect width="150" height="120" rx="12" fill="url(#cardbg)" stroke="#374151" stroke-width="1.5"/>
  <rect width="150" height="4" rx="2" fill="url(#wfgreen)"/>
  <text x="75" y="42" fill="#4ade80" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">PHASE 05</text>
  <text x="75" y="68" fill="#f3f4f6" font-family="-apple-system, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Validate</text>
  <text x="75" y="92" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="12" text-anchor="middle">Falsification</text>
  <text x="75" y="108" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Disprove first</text>
</g>

<!-- 6. REPORT -->
<g transform="translate(940, 110)">
  <rect width="150" height="120" rx="12" fill="url(#cardbg)" stroke="#374151" stroke-width="1.5"/>
  <rect width="150" height="4" rx="2" fill="url(#wfblue)"/>
  <text x="75" y="42" fill="#60a5fa" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">PHASE 06</text>
  <text x="75" y="68" fill="#f3f4f6" font-family="-apple-system, sans-serif" font-size="18" text-anchor="middle" font-weight="700">Report</text>
  <text x="75" y="92" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="12" text-anchor="middle">Evidence</text>
  <text x="75" y="108" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Redacted proof</text>
</g>

<!-- Arrows between cards -->
<line x1="195" y1="170" x2="215" y2="170" stroke="#c9a96e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
<line x1="375" y1="170" x2="395" y2="170" stroke="#c9a96e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
<line x1="555" y1="170" x2="575" y2="170" stroke="#c9a96e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
<line x1="735" y1="170" x2="755" y2="170" stroke="#c9a96e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>
<line x1="915" y1="170" x2="935" y2="170" stroke="#c9a96e" stroke-width="2" marker-end="url(#arrow)" opacity="0.6"/>

<!-- 7. STOP (centered below) -->
<g transform="translate(475, 290)">
  <rect width="250" height="110" rx="14" fill="#1a0f0a" stroke="#c9a96e" stroke-width="2" filter="url(#wfglow)"/>
  <rect width="250" height="4" rx="2" fill="url(#wfred)"/>
  <text x="125" y="38" fill="#f87171" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">PHASE 07</text>
  <text x="125" y="65" fill="#f3f4f6" font-family="-apple-system, sans-serif" font-size="22" text-anchor="middle" font-weight="700">Stop</text>
  <text x="125" y="88" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="13" text-anchor="middle">Minimum reproducible proof</text>
  <text x="125" y="104" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="11" text-anchor="middle">Close engagement</text>
</g>

<!-- Arrow from REPORT down to STOP -->
<path d="M1015 235 Q1015 290 730 310" fill="none" stroke="#c9a96e" stroke-width="2" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="6,4"/>

<!-- Safety boundary box -->
<g transform="translate(60, 440)">
  <rect width="1080" height="100" rx="12" fill="#111827" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
  <text x="24" y="30" fill="#f87171" font-family="-apple-system, sans-serif" font-size="14" font-weight="700">⛔  Safety Boundary</text>
  <text x="24" y="55" fill="#9ca3af" font-family="-apple-system, sans-serif" font-size="13">Stop on: real-user data · credentials · instability · third-party assets · irreversible change · unclear authorization</text>
  <text x="24" y="78" fill="#6b7280" font-family="-apple-system, sans-serif" font-size="12">No: DoS · phishing · credential attacks · persistence · malware · secret harvesting · cloud-metadata probing</text>
</g>

<!-- Bottom line -->
<rect x="0" y="580" width="1200" height="2" fill="url(#wfgold)" opacity="0.15"/>
</svg>
